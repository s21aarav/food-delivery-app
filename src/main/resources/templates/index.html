<!DOCTYPE html>
<html>
<body>
    <h2>Live Database Orders</h2>
    
    <form action="/add-order" method="POST">
        <input type="text" name="orderId" placeholder="Order ID" required>
        <input type="text" name="customerName" placeholder="Customer Name" required>
        <input type="text" name="restaurant" placeholder="Restaurant" required>
        <input type="number" step="0.01" name="amount" placeholder="Amount" required>
        <input type="text" name="status" placeholder="Status" required>
        <button type="submit">Add Order</button>
    </form>
    
    <br><hr><br>
    <div style="margin-bottom: 20px;">
        <a href="/"><button>📋 Show All</button></a>
        <a href="/sort"><button>↕️ Sort by Amount</button></a>
        <a href="/premium"><button>💎 Premium Orders (>₹1000)</button></a>
    </div>
    <table border="1">
        <tr><th>ID</th><th>Customer</th><th>Restaurant</th><th>Amount</th><th>Status</th></tr>
        <tr th:each="order : ${orders}">
            <td th:text="${order.orderId}"></td>
            <td th:text="${order.customerName}"></td>
            <td th:text="${order.restaurant}"></td>
            <td th:text="${order.amount}"></td>
            <td th:text="${order.status}"></td>
        </tr>
    </table>
</body>
</html>
